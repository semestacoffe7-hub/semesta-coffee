name: Deploy Flutter Web to Vercel Bypass

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ github.token }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Mock Assets (Create env)
        run: |
          echo "SUPABASE_URL=https://jhdsklpaubhkcwgswqrt.supabase.co" >> env
          echo "SUPABASE_ANON_KEY=sb_publishable_LX3NuW-7wlF6k-m__iI17A_krboNnAb" >> env

      - name: Build Web
        run: flutter build web --release --base-href /

      - name: Setup SPA Routing (Vercel Fallback)
        run: cp build/web/index.html build/web/404.html

      - name: Commit build to public folder
        run: |
          mkdir -p public
          cp -r build/web/* public/
          cp vercel.json public/vercel.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/
          git commit -m "chore: update public build for vercel" || echo "No changes to commit"
          git push
