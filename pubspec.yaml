name: smesta_coffee
description: "Semesta Cafee - Point of Sale Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  flutter_lucide: ^1.11.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  crypto: ^3.0.6
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.3.7
  image_picker: ^1.1.2

  # Export
  pdf: ^3.11.2
  printing: ^5.14.2

  # Dependency Injection
  get_it: ^8.0.3
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  csv: ^8.0.0
  audioplayers: ^6.8.1
  supabase_flutter: ^2.15.0
  esc_pos_utils_plus: ^2.0.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1A1A1A"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#1A1A1A"
    color: "#1A1A1A"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - env
